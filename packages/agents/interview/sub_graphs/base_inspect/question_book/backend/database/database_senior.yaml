question1:
  - 什么是 MVCC？如何解决读写冲突？
  - MVCC 是多版本并发控制，通过保存数据快照实现读写不冲突；读快照不阻塞写，写也不阻塞读

question2:
  - 数据库锁的类型有哪些？
  - 按粒度：表锁、行锁、页锁；按性质：共享锁、排他锁、意向锁；乐观锁、悲观锁

question3:
  - 什么是分库分表？分库分表的策略有哪些？
  - 分库分表将数据分散到多个库表，解决单表数据量过大的问题；策略：水平分表、垂直分表、水平分库、垂直分库

question4:
  - 如何优化慢 SQL？
  - 分析执行计划、添加索引、避免全表扫描、优化 JOIN、使用覆盖索引、分页优化、减少子查询

question5:
  - Redis 的持久化方式有哪些？
  - RDB 定时保存内存快照；AOF 记录所有写命令；RDB 恢复快，AOF 数据更安全
