question1:
  - 为什么要进行三次握手？两次握手有什么问题？
  - 三次握手确认双方收发能力；两次握手无法确认服务器的发送能力和客户端的接收能力

question2:
  - TCP 和 UDP 有什么区别？
  - TCP 是面向连接、可靠、有序；UDP 是无连接、不可靠、无序但速度快；TCP 适用文件传输，UDP 适用实时音视频

question3:
  - 输入网址到页面显示的全过程是什么？
  - DNS 解析 → TCP 建立连接 → 发送 HTTP 请求 → 服务器处理 → 返回响应 → 浏览器渲染页面

question4:
  - 什么是 OSI 七层模型？HTTP 属于哪一层？
  - 物理层、数据链路层、网络层、传输层、会话层、表示层、应用层；HTTP 属于应用层

question5:
  - 为什么 HTTPS 比 HTTP 安全？
  - HTTPS 使用 SSL/TLS 加密传输数据，防止数据被窃听和篡改，还有身份验证机制
