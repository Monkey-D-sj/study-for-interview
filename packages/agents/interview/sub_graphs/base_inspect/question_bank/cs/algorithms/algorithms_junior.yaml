question1:
  - 数组和链表有什么区别？
  - 数组连续内存存储，随机访问快但插入删除慢；链表非连续存储，插入删除快但访问慢

question2:
  - 什么是时间复杂度和空间复杂度？常见的时间复杂度有哪些？
  - 时间复杂度衡量算法执行时间随输入增长的变化；空间复杂度衡量内存使用；常见：O(1)、O(log n)、O(n)、O(n²)

question3:
  - 二分查找的时间复杂度是多少？有什么前提条件？
  - 时间复杂度 O(log n)；前提：数据必须是有序的

question4:
  - 栈和队列有什么区别？各自的常见应用场景是什么？
？
  - 栈是后进先出，队列是先进先出；栈：函数调用、括号匹配、浏览器历史；队列：任务队列、广度优先搜索

question5:
  - 什么是哈希表？哈希冲突如何解决？
  - 哈希表通过哈希函数快速存取数据；冲突解决：链地址法、开放寻址法、再哈希法
