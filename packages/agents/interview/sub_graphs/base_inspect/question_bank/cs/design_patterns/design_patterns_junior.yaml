question1:
  - 什么是单例模式？如何实现单例模式？
  - 单例模式保证一个类只有一个实例；实现：私有构造函数、静态变量存储实例、提供静态获取方法

question2:
  - 工厂模式和建造者模式有什么区别？
  - 工厂模式创建对象，侧重创建过程；建造者模式构建复杂对象，侧重分步构建

question3:
  - 什么是观察者模式？有哪些应用场景？
  - 观察者模式定义对象间的一对多依赖，当一个对象改变，所有依赖者收到通知；场景：事件系统、发布订阅

question4:
  - 装饰器模式和代理模式有什么区别？
  - 装饰器模式动态添加功能，关注增强对象；代理模式控制访问，关注控制和保护对象

question5:
  - 什么是策略模式？如何使用策略模式？
  - 策略模式定义一系列算法，可以互相替换；使用：定义策略接口、实现不同策略类、运行时选择策略
