question1:
  - 数据库事务的 ACID 特性是什么？
  - A 原子性：事务要么全做要么全不做；C 一致性：事务前后数据一致；I 隔离性：并发事务互不干扰；D 持久性：事务提交后永久保存

question2:
  - 什么是数据库的隔离级别？有哪些？
  - 隔离级别控制并发事务的可见性；有：读未提交、读已提交、可重复读、串行化

question3:
  - 什么是主键、外键和索引？
  - 主键唯一标识一行；外键关联其他表的主键；索引加速查询，类似于书的目录

question4:
  - 聚簇索引和非聚簇索引有什么区别？
  - 聚簇索引数据按索引顺序存储，一个表只能有一个；非聚簇索引索引和数据分开，可以有多个

question5:
  - 数据库连接池有什么作用？
  - 连接池复用数据库连接，避免频繁创建销毁，提高性能，限制最大连接数
