question1:
  - 解释一下 Python 的内存管理机制
  - Python 使用引用计数为主，标记-清除和分代回收为辅的垃圾回收机制

question2:
  - 什么是生成器（Generator）？yield 的作用是什么？
  - 生成器是懒求值的迭代器，节省内存；yield 暂停函数执行并返回值，下次调用从暂停处继续

question3:
  - Python 的多进程和多线程有什么区别？
  - 多进程利用多核 CPU，真正并行，内存独立；多线程受 GIL 限制，共享内存，适合 I/O 密集型

question4:
  - 什么是上下文管理器？如何实现？
  - 上下文管理器用于资源的获取和释放；用 __enter__ 和 __exit__ 实现或使用 contextlib 装饰器

question5:
  - Python 中的深拷贝和浅拷贝有什么区别？
  - 浅拷贝复制引用，修改拷贝影响原对象；深拷贝递归复制所有对象，完全独立；用 copy.deepcopy() 实现深拷
