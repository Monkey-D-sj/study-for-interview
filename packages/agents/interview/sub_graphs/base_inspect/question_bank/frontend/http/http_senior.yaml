question1:
  - 请解释 HTTP/1.1、HTTP/2、HTTP/3 的主要区别和改进点
  - HTTP/2：多路复用、头部压缩、二进制分帧；HTTP/3：基于 QUIC 协议（UDP），解决了 TCP 队头阻塞问题

question2:
  - 什么是队头阻塞？HTTP/1.1、HTTP/2、HTTP/3 分别如何处理？
  - 队头阻塞是前一个请求阻塞后续请求；HTTP/1.1 管道化未解决；HTTP/2 通过多路复用解决 TCP 层队头阻塞；HTTP/3 基于 QUIC 解决了所有队头阻塞

question3:
  - 描述一下 HTTP 请求的完整过程（DNS 查询、TCP 连接、TLS 握手等）
  - DNS 解析 → TCP 三次握手 → TLS 四次握手 → 发送 HTTP 请求 → 接收响应 → 断开连接（或保持长连接）

question4:
  - CDN 的原理是什么？如何处理动态内容？
  - CDN 通过边缘节点缓存静态资源加速访问；动态内容通过智能路由回源或使用边缘计算

question5:
  - 在高并发场景下，如何优化 HTTP 服务性能？
  - 连接池复用、HTTP/2 多路复用、压缩传输、减少请求数、负载均衡、使用缓存、异步非阻塞 I/O