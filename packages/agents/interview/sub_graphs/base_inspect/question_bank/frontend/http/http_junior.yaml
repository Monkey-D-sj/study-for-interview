question1:
  - HTTP 协议默认使用的端口号是多少？
  - 80

question2:
  - HTTP 状态码 404 代表什么意思？
  - 未找到页面（或：请求的资源不存在）

question3:
  - HTTP 请求中 GET 和 POST 方法的主要区别是什么？
  - GET 用于获取数据，参数在 URL 中；POST 用于提交数据，参数在请求体中

question4:
  - HTTP 响应状态码 200 代表什么含义？
  - 请求成功（或：OK）

question5:
  - 常见的 HTTP 请求方法中，用于删除服务器资源的是哪一个？
  - DELETE