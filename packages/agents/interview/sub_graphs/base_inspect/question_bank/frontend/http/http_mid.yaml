question1:
  - HTTP 和 HTTPS 有什么区别？HTTPS 是如何保证安全的？
  - HTTPS 是 HTTP 的安全版本，使用 SSL/TLS 加密；安全保证：数据加密、身份验证、数据完整性

question2:
  - 什么是 HTTP 长连接？与短连接有什么区别？
  - 长连接是指一个 TCP 连接可以发送多个 HTTP 请求（Connection: keep-alive）；短连接每个请求都建立新连接

question3:
  - HTTP 缓存机制中的强缓存和协商缓存有什么区别？
  - 强缓存不与服务器通信直接使用缓存；协商缓存会向服务器验证缓存是否有效

question4:
  - HTTP 状态码 301、302、304、307 分别代表什么？
  - 301 永久重定向；302 临时重定向；304 资源未修改，使用缓存；307 临时重定向（保持请求方法）

question5:
  - 什么是 CORS？如何解决跨域问题？
  - CORS 是跨域资源共享机制；解决方法：后端设置 Access-Control-Allow-Origin 等响应头、使用代理服务器